services:
  - type: web
    name: shara-dt
    runtime: python
    rootDir: src/server_flask

    buildCommand: |
      cd ../web && yarn install && yarn build && cp -r dist ../server_flask/static
      pip install -r requirements.txt

    startCommand: python app.py

    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: EYES_WIDTH
        value: 600
      - key: EYES_HEIGHT
        value: 1024
      - key: PYTHON_VERSION
        value: 3.11.0